name: Agent PR Loop Orchestrator

on:
  pull_request:
    types: [opened]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read
  pull-requests: read

jobs:
  kickoff-review-cycle:
    name: Post first review kickoff comment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Publish first review comment
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            if (!pullRequest) {
              core.info("No pull_request payload found.");
              return;
            }

            const prNumber = pullRequest.number;
            const prUrl = pullRequest.html_url;
            const marker = `<!-- agent-kickoff-pr:${prNumber} -->`;

            const existingComments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const alreadyPosted = existingComments.data.some((comment) =>
              (comment.body || "").includes(marker)
            );
            if (alreadyPosted) {
              core.info(`Kickoff comment already exists for PR #${prNumber}.`);
              return;
            }

            const firstComment = [
              "### Agent review kickoff (auto)",
              "",
              "Start the loop for this PR:",
              "1) Review the full diff for correctness, scope, regressions, and maintainability.",
              "2) Run relevant tests/checks locally if needed.",
              "3) Implement and push any needed fixes directly to this PR branch.",
              "4) Comment back with a concise summary and verification evidence.",
              "",
              `PR: ${prUrl}`,
              "",
              "Note: this workflow does not respond to comments with more comments.",
              marker,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: firstComment,
            });

  ci-failure-loop-prompt:
    name: Post fix prompt for failing CI
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Publish fix-loop prompt for failed CI runs
        uses: actions/github-script@v7
        with:
          script: |
            async function hasIssueCommentWithMarker({ owner, repo, issueNumber, marker }) {
              let page = 1;
              const perPage = 100;

              while (true) {
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  per_page: perPage,
                  page,
                });

                if (comments.some((comment) => (comment.body || "").includes(marker))) {
                  return true;
                }

                if (comments.length < perPage) {
                  return false;
                }

                page += 1;
              }
            }

            const run = context.payload.workflow_run;
            if (!run) {
              core.info("No workflow_run payload.");
              return;
            }

            if (run.name !== "CI") {
              core.info(`Skipping non-CI workflow run: ${run.name}`);
              return;
            }

            const prRefs = run.pull_requests || [];
            if (prRefs.length === 0) {
              core.info("No PR references on failed CI run.");
              return;
            }

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const failedJobs = (jobs.data.jobs || []).filter(
              (job) => job.conclusion === "failure"
            );
            const failedJobLines =
              failedJobs.length > 0
                ? failedJobs.map((job) => `- ${job.name}: ${job.html_url}`)
                : ["- CI run failed but failed jobs were not enumerated."];

            for (const prRef of prRefs) {
              const prNumber = prRef.number;
              const marker = `<!-- agent-ci-failure-run:${run.id}:pr:${prNumber} -->`;

              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              if (pr.data.state !== "open") {
                core.info(`Skipping closed PR #${prNumber}.`);
                continue;
              }

              const alreadyPosted = await hasIssueCommentWithMarker({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issueNumber: prNumber,
                marker,
              });
              if (alreadyPosted) {
                core.info(`Failure prompt already posted for run ${run.id} on PR #${prNumber}.`);
                continue;
              }

              const failureComment = [
                "### CI failure follow-up (auto)",
                "",
                "CI failed for this PR. Continue the loop:",
                "1) Inspect failed jobs linked below.",
                "2) Apply minimal correct fixes on this PR branch.",
                "3) Re-run relevant checks locally.",
                "4) Push and comment with what was fixed and evidence.",
                "",
                `Failing run: ${run.html_url}`,
                "",
                "Failed jobs:",
                ...failedJobLines,
                marker,
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: failureComment,
              });
            }
