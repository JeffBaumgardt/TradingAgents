services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

  agents-service:
    build:
      context: .
      dockerfile: apps/agents-service/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/apps/agents-service
    ports:
      - "8000:8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - PORT=4000
      - AGENTS_SERVICE_URL=http://agents-service:8000
      - DATABASE_PATH=/data/tradingagents-api.db
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - api_data:/data
    depends_on:
      - agents-service

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tradingagents
      POSTGRES_PASSWORD: tradingagents
      POSTGRES_DB: tradingagents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  tradingagents_data:
  ollama_data:
  api_data:
  postgres_data:
