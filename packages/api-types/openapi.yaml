openapi: 3.1.0
info:
  title: TradingAgents API
  version: 1.0.0
  description: |
    Public API gateway for TradingAgents analysis sessions.
    Proxies run execution to the Python agents-service.
servers:
  - url: http://localhost:4000
    description: Local development
tags:
  - name: health
  - name: config
  - name: credentials
  - name: users
  - name: sessions
  - name: feedback
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /config/options:
    get:
      tags: [config]
      summary: List configuration options
      description: Analysts, research depths, languages, and LLM providers.
      operationId: getConfigOptions
      responses:
        "200":
          description: Configuration options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigOptions"
  /config/credentials/schema:
    get:
      tags: [config]
      summary: Provider credential field definitions
      operationId: getCredentialsSchema
      responses:
        "200":
          description: Credential schema for the setup UI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialsSchemaResponse"
  /credentials:
    get:
      tags: [credentials]
      summary: Get stored credentials for the current user
      description: |
        Returns provider credential fields with secret values replaced by a
        fixed placeholder. Real API keys are never included in the response.
      operationId: getUserCredentials
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      responses:
        "200":
          description: Masked stored credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredCredentialsResponse"
        "401":
          description: Missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [credentials]
      summary: Save provider credentials for the current user
      description: |
        Writes credential values to the database. Submitting the secret
        placeholder leaves an existing key unchanged. Responses always mask
        secret fields.
      operationId: saveUserCredentials
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCredentialsRequest"
      responses:
        "200":
          description: Saved credentials (masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredCredentialsResponse"
        "401":
          description: Missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /feedback:
    post:
      tags: [feedback]
      summary: Submit product feedback
      description: |
        Sends feedback email via Resend. When sessionId is provided, includes
        run metadata (not report bodies). Reply-To is the authenticated user's
        email from the database when available.
      operationId: submitFeedback
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Feedback accepted and emailed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid feedback payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found or not owned by the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many feedback submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Feedback email provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me:
    get:
      tags: [users]
      summary: Get or create the current user record
      description: |
        Ensures a local user row exists for the Clerk user id sent in X-User-Id.
        Creates a stub record when the Clerk webhook has not arrived yet.
      operationId: getCurrentUser
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [users]
      summary: Sync Clerk profile fields for the current user
      operationId: updateCurrentUser
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /webhooks/clerk:
    post:
      tags: [users]
      summary: Clerk user lifecycle webhook
      description: |
        Receives verified Clerk user.created, user.updated, and user.deleted events.
        Not authenticated via X-User-Id; verified with CLERK_WEBHOOK_SIGNING_SECRET.
      operationId: clerkWebhook
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid webhook signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/resolve:
    post:
      tags: [config]
      summary: Resolve config filtered by user credentials
      description: |
        Returns analysts, languages, and only the LLM providers for which
        the user has stored valid credentials. Secret keys are loaded
        server-side and never returned.
      operationId: resolveConfig
      parameters:
        - $ref: "#/components/parameters/UserIdHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveConfigRequest"
      responses:
        "200":
          description: Filtered configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedConfigResponse"
  /config/providers/{provider}/models:
    post:
      tags: [config]
      summary: List models for a provider (credential-aware)
      operationId: getProviderModelsWithCredentials
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderModelsRequest"
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelsResponse"
        "403":
          description: No credentials for provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [config]
      summary: List models for a provider
      operationId: getProviderModels
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ModelMode"
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelsResponse"
        "404":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions:
    get:
      tags: [sessions]
      summary: List analysis sessions
      operationId: listSessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
    post:
      tags: [sessions]
      summary: Create analysis session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}:
    get:
      tags: [sessions]
      summary: Get session status
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [sessions]
      summary: Cancel session
      operationId: cancelSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/events:
    get:
      tags: [sessions]
      summary: List persisted session events
      operationId: getSessionEvents
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Stored events in chronological order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEventsResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/stream:
    get:
      tags: [sessions]
      summary: Stream session events (SSE)
      operationId: streamSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: live
          in: query
          required: false
          description: When true, skip replaying stored events (for SSE reconnects).
          schema:
            type: boolean
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseEvent"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/report:
    get:
      tags: [sessions]
      summary: Get final report
      operationId: getSessionReport
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Final analysis report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionReport"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Report not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/trade-check:
    get:
      tags: [sessions]
      summary: Get distilled Trade Check report
      operationId: getSessionTradeCheck
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Distilled Trade Check artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTradeCheckResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Trade Check not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      deprecated: true
      schema:
        type: string
      description: Deprecated. Use Authorization Bearer token with a Clerk session JWT instead.
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: Clerk session JWT as `Bearer <token>`.
  schemas:
    HealthResponse:
      type: object
      required: [status, service, agentsService]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        agentsService:
          type: string
          enum: [ok, unreachable]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
    User:
      type: object
      required: [id, email, firstName, lastName, imageUrl, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Clerk user id (user_xxx)
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
    FeedbackSource:
      type: string
      enum: [post_run, footer]
    FeedbackCategory:
      type: string
      enum: [bug, idea, praise, other]
    FeedbackRequest:
      type: object
      required: [message, source]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 4000
        category:
          $ref: "#/components/schemas/FeedbackCategory"
        rating:
          type: integer
          minimum: 1
          maximum: 5
        sessionId:
          type: string
          format: uuid
        pageUrl:
          type: string
        source:
          $ref: "#/components/schemas/FeedbackSource"
    FeedbackResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
    AnalystType:
      type: string
      enum: [market, social, news, fundamentals]
    ResearchDepth:
      type: integer
      enum: [1, 3, 5]
    ModelMode:
      type: string
      enum: [quick, deep]
    GoogleThinkingLevel:
      type: string
      enum: [high, minimal]
    ReasoningEffort:
      type: string
      enum: [low, medium, high]
    SessionStatus:
      type: string
      enum: [pending, running, completed, error, cancelled]
    SseEventType:
      type: string
      enum:
        - run.started
        - agent.status
        - message
        - tool.call
        - report.section
        - stats
        - run.completed
        - run.error
    ConfigOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string
    ModelOption:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
        label:
          type: string
        capabilities:
          type: object
          additionalProperties:
            type: boolean
          description: |
            Optional provider-specific capability flags (e.g. anthropicEffort,
            openaiReasoningEffort, googleThinkingLevel).
    ConfigOptions:
      type: object
      required: [analysts, researchDepths, languages, providers]
      properties:
        analysts:
          type: array
          items:
            $ref: "#/components/schemas/ConfigOption"
        researchDepths:
          type: array
          items:
            type: object
            required: [value, label]
            properties:
              value:
                $ref: "#/components/schemas/ResearchDepth"
              label:
                type: string
        languages:
          type: array
          items:
            $ref: "#/components/schemas/ConfigOption"
        providers:
          type: array
          items:
            type: object
            required: [id, label]
            properties:
              id:
                type: string
              label:
                type: string
              backendUrl:
                type: string
                nullable: true
    ProviderModelsResponse:
      type: object
      required: [provider, mode, models]
      properties:
        provider:
          type: string
        mode:
          $ref: "#/components/schemas/ModelMode"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelOption"
    CreateSessionRequest:
      type: object
      required:
        - ticker
        - analysisDate
        - outputLanguage
        - analysts
        - researchDepth
        - llmProvider
        - quickThinkLlm
        - deepThinkLlm
      properties:
        ticker:
          type: string
          example: SPY
        userContext:
          type: string
          maxLength: 8192
          description: Free-text investing context stored in session config (JSONB parameter binding; never used in SQL filters).
        analysisDate:
          type: string
          format: date
          example: "2026-06-26"
        outputLanguage:
          type: string
          example: English
        analysts:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AnalystType"
        researchDepth:
          $ref: "#/components/schemas/ResearchDepth"
        llmProvider:
          type: string
          example: openai
        backendUrl:
          type: string
          nullable: true
        quickThinkLlm:
          type: string
        deepThinkLlm:
          type: string
        googleThinkingLevel:
          $ref: "#/components/schemas/GoogleThinkingLevel"
        openaiReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        anthropicEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        checkpointEnabled:
          type: boolean
          default: false
        providerCredentials:
          type: object
          readOnly: true
          description: |
            Loaded server-side from stored user credentials. Clients must not
            send secret API keys on session creation.
          additionalProperties:
            type: object
            additionalProperties:
              type: string
    SaveCredentialsRequest:
      type: object
      required: [providerCredentials]
      properties:
        providerCredentials:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
    StoredCredentialsResponse:
      type: object
      required: [providerCredentials]
      properties:
        providerCredentials:
          type: object
          description: |
            Secret fields contain a fixed placeholder (********) when a value
            is stored. The real key is never returned.
          additionalProperties:
            type: object
            additionalProperties:
              type: string
    ResolveConfigRequest:
      type: object
      description: Credentials are loaded from server storage; body is ignored.
    ProviderModelsRequest:
      type: object
      required: [mode]
      properties:
        mode:
          $ref: "#/components/schemas/ModelMode"
        providerCredentials:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
    CredentialField:
      type: object
      required: [name, label, secret, required]
      properties:
        name:
          type: string
        label:
          type: string
        secret:
          type: boolean
        required:
          type: boolean
        placeholder:
          type: string
          nullable: true
    ProviderCredentialDefinition:
      type: object
      required: [id, label, requiresApiKey, credentialFields, modelSource, apiKeyUrl]
      properties:
        id:
          type: string
        label:
          type: string
        backendUrl:
          type: string
          nullable: true
        requiresApiKey:
          type: boolean
        credentialFields:
          type: array
          items:
            $ref: "#/components/schemas/CredentialField"
        modelSource:
          type: string
          enum: [static, live, static_or_live]
        apiKeyUrl:
          type: string
          nullable: true
          description: Official URL where users can sign up and create an API key.
    CredentialsSchemaResponse:
      type: object
      required: [providers, modelCatalogNote]
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderCredentialDefinition"
        modelCatalogNote:
          type: string
    ResolvedConfigResponse:
      allOf:
        - $ref: "#/components/schemas/ConfigOptions"
        - type: object
          required: [credentialsSchema, availableProviderIds]
          properties:
            credentialsSchema:
              $ref: "#/components/schemas/CredentialsSchemaResponse"
            availableProviderIds:
              type: array
              items:
                type: string
    SessionConfig:
      allOf:
        - $ref: "#/components/schemas/CreateSessionRequest"
    Session:
      type: object
      required: [id, status, ticker, analysisDate, config, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        ticker:
          type: string
        analysisDate:
          type: string
          format: date
        config:
          $ref: "#/components/schemas/SessionConfig"
        runId:
          type: string
          format: uuid
          nullable: true
        error:
          type: string
          nullable: true
        decision:
          type: string
          nullable: true
          description: Final portfolio rating when the run completed successfully.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SessionListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    SessionEvent:
      type: object
      required: [id, type, payload, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    SessionEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionEvent"
    SessionReport:
      type: object
      required: [sessionId, markdown, sections, decision]
      properties:
        sessionId:
          type: string
          format: uuid
        markdown:
          type: string
        sections:
          type: object
          additionalProperties:
            type: string
            nullable: true
        decision:
          type: string
          nullable: true
        tradeCheck:
          $ref: "#/components/schemas/TradeCheckReport"
          nullable: true
    SessionTradeCheckResponse:
      type: object
      required: [sessionId, tradeCheck]
      properties:
        sessionId:
          type: string
          format: uuid
        tradeCheck:
          $ref: "#/components/schemas/TradeCheckReport"
    TradeCheckReport:
      type: object
      additionalProperties: true
    SseEvent:
      type: object
      required: [type, data]
      properties:
        type:
          $ref: "#/components/schemas/SseEventType"
        data:
          type: object
          additionalProperties: true
